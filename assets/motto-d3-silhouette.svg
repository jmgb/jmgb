<svg xmlns="http://www.w3.org/2000/svg" width="820" height="190" viewBox="0 0 820 190" role="img" aria-label="If you want to go fast, go alone. If you want to go far, go together. If you want to go fast and far, go with agents. — Miguel, solo founder, Presupuestor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02133b"/>
      <stop offset="1" stop-color="#052b87"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#4479f8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4479f8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="avatarClip">
      <circle cx="104" cy="95" r="46"/>
    </clipPath>
  </defs>
  <rect x="1.5" y="1.5" width="817" height="187" rx="16" fill="url(#bg)" stroke="#1e3a8a" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="817" height="187" rx="16" fill="url(#glow)"/>
  <g clip-path="url(#avatarClip)">
    <circle cx="104" cy="95" r="46" fill="#0a2c74"/>
    <circle cx="104" cy="82" r="16" fill="#7fa3fa"/>
    <path d="M104 103 c-21 0 -33 13 -33 26 l0 13 66 0 0 -13 c0 -13 -12 -26 -33 -26 z" fill="#7fa3fa"/>
  </g>
  <circle cx="104" cy="95" r="46" fill="none" stroke="#4479f8" stroke-width="2.5"/>
  <text x="190" y="54" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-style="italic" font-size="17" fill="#b5cafc">If you want to go fast, go alone.</text>
  <text x="190" y="86" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-style="italic" font-size="17" fill="#b5cafc">If you want to go far, go together.</text>
  <text x="190" y="134" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="24" fill="#ffffff">If you want to go fast and far, <tspan fill="#f97316">go with agents</tspan>.</text>
  <text x="190" y="166" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#7fa3fa">— Miguel · solo founder, Presupuestor</text>
</svg>
