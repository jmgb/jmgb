<svg xmlns="http://www.w3.org/2000/svg" width="820" height="190" viewBox="0 0 820 190" role="img" aria-label="If you want to go fast, go alone. If you want to go far, go together. If you want to go fast and far, go with agents.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02133b"/>
      <stop offset="1" stop-color="#052b87"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#4479f8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4479f8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1.5" y="1.5" width="817" height="187" rx="16" fill="url(#bg)" stroke="#1e3a8a" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="817" height="187" rx="16" fill="url(#glow)"/>
  <text x="60" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="64" fill="#4479f8" opacity="0.55">&#8220;</text>
  <text x="410" y="60" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-style="italic" font-size="17" fill="#b5cafc">If you want to go fast, go alone.</text>
  <text x="410" y="92" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-style="italic" font-size="17" fill="#b5cafc">If you want to go far, go together.</text>
  <text x="410" y="142" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="26" fill="#ffffff">If you want to go fast and far, <tspan fill="#f97316">go with agents</tspan>.</text>
</svg>
