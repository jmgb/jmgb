<svg xmlns="http://www.w3.org/2000/svg" width="720" height="214" viewBox="0 0 720 214" preserveAspectRatio="xMidYMid meet" role="img" aria-label="If you want to go fast, go alone. If you want to go far, go together. If you want to go fast and far, go with agents.">
  <style>
    .muted { font: italic 400 21px "Segoe UI", Helvetica, Arial, sans-serif; fill: #59636e; }
    .final { font: 700 34px "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2328; }
    .accent { fill: #0848e2; }
    .caret { fill: #0848e2; opacity: 0; animation: blink 1.1s step-end 5s infinite; }
    @media (prefers-color-scheme: dark) {
      .muted { fill: #9198a1; }
      .final { fill: #f0f6fc; }
      .accent { fill: #4479f8; }
      .caret { fill: #4479f8; }
    }
    .l1 { animation: fadein 0.9s ease-out both; }
    .l2 { animation: fadein 0.9s ease-out 1s both; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>
  <defs>
    <mask id="wipe">
      <rect x="80" y="96" width="0" height="98" fill="#ffffff">
        <animate attributeName="width" from="0" to="560" begin="2.2s" dur="2.6s" fill="freeze"/>
      </rect>
    </mask>
  </defs>
  <text class="muted l1" x="360" y="44" text-anchor="middle">If you want to go fast, go alone.</text>
  <text class="muted l2" x="360" y="78" text-anchor="middle">If you want to go far, go together.</text>
  <g class="final" text-anchor="middle" mask="url(#wipe)">
    <text x="360" y="132">If you want to go fast and far,</text>
    <text x="360" y="178"><tspan class="accent">go with agents</tspan>.</text>
  </g>
  <rect class="caret" x="500" y="148" width="3" height="36"/>
</svg>
