<svg xmlns="http://www.w3.org/2000/svg" width="600" height="172" viewBox="0 0 600 172" preserveAspectRatio="xMidYMid meet" role="img" aria-label="If you want to go fast, go alone. If you want to go far, go together. If you want to go fast and far, go with agents.">
  <style>
    .muted { font: italic 400 30px "Segoe UI", Helvetica, Arial, sans-serif; fill: #59636e; }
    .final { font: 700 26px "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2328; }
    .accent { fill: #0848e2; }
    .caret { fill: #0848e2; opacity: 0; animation: blink 1.1s step-end 5s infinite; }
    @media (prefers-color-scheme: dark) {
      .muted { fill: #9198a1; }
      .final { fill: #f0f6fc; }
      .accent { fill: #4479f8; }
      .caret { fill: #4479f8; }
    }
    .l1 { animation: fadein 0.9s ease-out both; }
    .l2 { animation: fadein 0.9s ease-out 1s both; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>
  <defs>
    <mask id="wipe">
      <rect x="0" y="108" width="0" height="44" fill="#ffffff">
        <animate attributeName="width" from="0" to="600" begin="2.2s" dur="2.6s" fill="freeze"/>
      </rect>
    </mask>
  </defs>
  <text class="muted l1" x="300" y="44" text-anchor="middle">If you want to go fast, go alone.</text>
  <text class="muted l2" x="300" y="88" text-anchor="middle">If you want to go far, go together.</text>
  <text class="final" x="300" y="142" text-anchor="middle" mask="url(#wipe)" textLength="560" lengthAdjust="spacingAndGlyphs">If you want to go fast and far, <tspan class="accent">go with agents</tspan>.</text>
  <rect class="caret" x="588" y="116" width="3" height="30"/>
</svg>
