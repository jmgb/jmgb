<svg xmlns="http://www.w3.org/2000/svg" width="600" height="440" viewBox="0 0 600 440" preserveAspectRatio="xMidYMid meet" role="img" aria-label="If you want to go fast, go alone. If you want to go far, go together. If you want to go fast and far, go with agents.">
  <style>
    .muted { font: italic 400 34px "Segoe UI", Helvetica, Arial, sans-serif; fill: #59636e; }
    .final { font: 700 48px "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2328; }
    .accent { fill: #0848e2; }
    .caret { fill: #0848e2; opacity: 0; animation: blink 1.1s step-end 5s infinite; }
    @media (prefers-color-scheme: dark) {
      .muted { fill: #9198a1; }
      .final { fill: #f0f6fc; }
      .accent { fill: #4479f8; }
      .caret { fill: #4479f8; }
    }
    .l1 { animation: fadein 0.9s ease-out both; }
    .l2 { animation: fadein 0.9s ease-out 1s both; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>
  <defs>
    <mask id="wipe">
      <rect x="70" y="212" width="0" height="190" fill="#ffffff">
        <animate attributeName="width" from="0" to="460" begin="2.2s" dur="2.6s" fill="freeze"/>
      </rect>
    </mask>
  </defs>
  <g class="muted l1" text-anchor="middle">
    <text x="300" y="52">If you want to go fast,</text>
    <text x="300" y="94">go alone.</text>
  </g>
  <g class="muted l2" text-anchor="middle">
    <text x="300" y="150">If you want to go far,</text>
    <text x="300" y="192">go together.</text>
  </g>
  <g class="final" text-anchor="middle" mask="url(#wipe)">
    <text x="300" y="272">If you want to go</text>
    <text x="300" y="328">fast and far,</text>
    <text x="300" y="384"><tspan class="accent">go with agents</tspan>.</text>
  </g>
  <rect class="caret" x="482" y="348" width="4" height="48"/>
</svg>
